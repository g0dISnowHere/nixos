# Nirinit config (dotfiles/modules/compositor/nirinit/config.toml)
# Tier 2: Persistence (autosave/restore only)
# - Keep mappings empty until Tier 2.5

# interval in seconds between autosaves (default is usually fine)
save_interval = 30

# Tier 2.5: Deterministic restore (commented placeholder)
# [mappings]
# "2:research" = ["Vivaldi-flatpak", "org.mozilla.firefox"]
# Tier 2.5: Ignore transient windows (commented placeholder)
[ignore]
app_id = ["pavucontrol", "blueman-manager"]
